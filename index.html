        .character-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }

        function renderPlayers(filteredPlayers) {
            const grid = document.getElementById('playerGrid');
            grid.innerHTML = '';
            
            filteredPlayers.forEach(player => {
                const card = document.createElement('div');
                card.className = 'player-card';
                card.innerHTML = `
                    <div class="username">${player.username}</div>
                    <div class="stats">
                        Lv: ${player.lv || 'N/A'} | Unit: ${player.unit || 'N/A'}<br>
                        HP: ${player.hp || 'N/A'} | ATK: ${player.atk || 'N/A'} | MAG: ${player.mag || 'N/A'}<br>
                        Gil: ${player.gil || 'N/A'} | Wins: ${player.wins || '0'}
                    </div>
                `;
                card.onclick = () => showPlayerDetail(player);
                grid.appendChild(card);
            });
        }

        function filterPlayers() {
            const term = document.getElementById('search').value.toLowerCase().trim();
            const filtered = players.filter(p => 
                p.username.toLowerCase().includes(term) || 
                (p.unit && p.unit.toLowerCase().includes(term))
            );
            renderPlayers(filtered);
        }

        function showPlayerDetail(player) {
            const modal = document.getElementById('playerModal');
            const content = document.getElementById('modalContent');
            
            let charHTML = '<h2>Recruited Characters</h2><div class="character-grid">';
            
            // Extract awakening characters
            for (let key in player) {
                if (key.startsWith('awakeninglv')) {
                    const charName = key.replace('awakeninglv', '').trim();
                    const level = player[key];
                    const psKey = 'ps' + charName.replace(/ /g, '');
                    const passive = player[psKey] || player['ps5' + charName] || 'None';
                    
                    if (level && level !== '0') {
                        charHTML += `
                            <div class="character">
                                <strong>${charName}</strong><br>
                                Awakening Lv: <strong>${level}</strong><br>
                                Passive: ${passive}
                            </div>
                        `;
                    }
                }
            }
            
            charHTML += '</div>';
            
            content.innerHTML = `
                <h1>${player.username}</h1>
                <div class="stats" style="font-size:16px; line-height:1.8;">
                    <strong>Level:</strong> ${player.lv} | <strong>Unit:</strong> ${player.unit}<br>
                    <strong>HP:</strong> ${player.hp} | <strong>ATK:</strong> ${player.atk} | <strong>MAG:</strong> ${player.mag}<br>
                    <strong>Gil:</strong> ${player.gil} | <strong>Wins:</strong> ${player.wins} | <strong>Collection:</strong> ${player.collection}
                </div>
                ${charHTML}
            `;
            modal.style.display = 'block';
        }

        function closeModal() {
            document.getElementById('playerModal').style.display = 'none';
        }

        // Initial render
        renderPlayers(players);
        
        // Close modal if clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('playerModal');
            if (event.target === modal) closeModal();
        }
    </script>
